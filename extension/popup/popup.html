<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StealthChat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🔒</span>
        <h1>StealthChat</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">☀</button>
        <select id="lang-select" class="lang-select" title="Language">
          <option value="en">EN</option>
          <option value="ru">RU</option>
          <option value="uk">UK</option>
          <option value="de">DE</option>
        </select>
        <span class="version">v1.2</span>
      </div>
    </header>

    <!-- Toast notification area -->
    <div id="popup-toast-area"></div>

    <!-- Current page status -->
    <section id="status-section" class="section">
      <div class="status-bar">
        <div id="status-indicator" class="indicator off"></div>
        <span id="status-text">Checking...</span>
      </div>
    </section>

    <!-- No session state -->
    <section id="no-session" class="section hidden">
      <p class="hint" id="no-session-hint">No encryption session for this page.</p>
      <button id="btn-start" class="btn btn-primary">
        Start Encryption
      </button>
    </section>

    <!-- Pending key exchange -->
    <section id="pending-exchange" class="section hidden">
      <div class="pending-status">
        <div class="spinner"></div>
        <p id="pending-text">Waiting for peer's key...</p>
      </div>
      <p class="hint" id="pending-hint">Paste the encoded key into the chat and send it to your contact.</p>
    </section>

    <!-- Active session -->
    <section id="active-session" class="section hidden">
      <div class="session-info">
        <span id="session-label" class="label"></span>
        <label class="toggle">
          <input type="checkbox" id="toggle-session" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Session selector (when multiple sessions match this URL) -->
      <div id="session-selector" class="hidden">
        <select id="session-select" class="select"></select>
      </div>

      <!-- Fingerprint verification -->
      <div id="fingerprint-section" class="fingerprint-section">
        <div class="fingerprint-header">
          <span class="fingerprint-label" id="fp-label">Fingerprint</span>
          <span class="fingerprint-hint-icon" id="fp-hint-icon" title="">?</span>
        </div>
        <div id="fingerprint-grid" class="fingerprint-grid"></div>
      </div>

      <div class="session-actions">
        <button id="btn-rotate" class="btn btn-ghost btn-sm">Rotate Key</button>
        <button id="btn-reset" class="btn btn-danger btn-sm">Reset Keys</button>
      </div>
      <p class="hint hint-keys" id="hotkey-hint"></p>
    </section>

    <!-- Sessions list -->
    <section class="section">
      <h2 class="section-title" id="sessions-title">Sessions</h2>
      <div id="sessions-list" class="sessions-list">
        <p class="empty-state" id="empty-sessions">No sessions yet</p>
      </div>
    </section>

    <!-- Footer actions -->
    <footer class="footer">
      <button id="btn-export" class="btn btn-ghost btn-sm">Export</button>
      <button id="btn-import" class="btn btn-ghost btn-sm">Import</button>
      <button id="btn-reset-all" class="btn btn-danger btn-sm">Reset All</button>
    </footer>
  </div>

  <input type="file" id="import-file" accept=".json" class="hidden">

  <script src="../lib/i18n.js"></script>
  <script src="../lib/wordlist.js"></script>
  <script src="../lib/encoder.js"></script>
  <script src="../lib/protocol.js"></script>
  <script src="popup.js"></script>
</body>
</html>
